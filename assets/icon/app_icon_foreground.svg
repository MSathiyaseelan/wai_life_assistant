    <path d="M103,143 H155 V169 A16,16 0 0 1 139,185 H103 Z" fill="url(#p)"/>
  </g>

  <!-- basket -->
  <path d="M49,113 L67,113 L64,127 L52,127 Z" fill="#ffffff"/>
  <path d="M51,111 A7,7 0 0 1 65,111" fill="none" stroke="#ffffff" stroke-width="2.4" stroke-linecap="round"/>
  <line x1="55" y1="115" x2="53" y2="125" stroke="url(#g)" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="58" y1="115" x2="57" y2="125" stroke="url(#g)" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="61" y1="115" x2="61" y2="125" stroke="url(#g)" stroke-width="1.4" stroke-linecap="round"/>

