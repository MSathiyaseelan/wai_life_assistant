  <line x1="136" y1="163" x2="146" y2="163" stroke="url(#p)" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="136" y1="167" x2="146" y2="167" stroke="url(#p)" stroke-width="1.8" stroke-linecap="round"/>
