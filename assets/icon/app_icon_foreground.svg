  <line x1="54" y1="156" x2="54" y2="161" stroke="#ffffff" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="64" y1="156" x2="64" y2="161" stroke="#ffffff" stroke-width="2.2" stroke-linecap="round"/>
  <polyline points="53,167 58,171 65,162" fill="none" stroke="url(#o)" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- notes -->
