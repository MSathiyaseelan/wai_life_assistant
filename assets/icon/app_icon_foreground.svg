  <path d="M148,168 L156,176 L150,178 L148,172 Z" fill="#ffffff" stroke="url(#p)" stroke-width="1"/>

  <!-- family badge -->
  <circle cx="100" cy="100" r="28" fill="#ffffff"/>
  <circle cx="88" cy="93" r="7.5" fill="url(#g)"/>
  <path d="M77,113 A11,13 0 0 1 99,113 Z" fill="url(#g)"/>
